name: CI for frontend

on:
  push:
    branches:
        - master
    paths:
      - Frontend/**
      - .github/workflows/frontend-ci.yml


jobs:
  setup:
    name: Setting up node js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

  unit-test:
    name: Unit-Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.TOKEN}}

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      
      - name: Lint check
        working-directory: Frontend
        run: npm run test



  lint:
    name: Static-code 
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.TOKEN}}

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      
      - name: Lint check
        working-directory: Frontend
        run: npm run lint

     
  build:
    name: Build code
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.TOKEN}}

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: 'npm'
          cache-dependency-path: Frontend/package-lock.json

      
      - name: Install dependencies
        working-directory: Frontend
        run: npm ci
      
      - name: Build project
        working-directory: Frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: Frontend/dist/

  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN}}
        
 
        - name: setup of docker buildx
          uses: docker/setup-buildx-action@v3

        - name: login to docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and Push action
          uses: docker/build-push-action@v6
          with:
            context: Frontend
            file: Frontend/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{github.run_id}}

  trivy_scan:
    runs-on: ubuntu-latest
    needs: docker
    steps:
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
          with:
            image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{github.run_id}}'
            format: 'sarif'
            template: '@/contrib/sarif.tpl'
            output: 'trivy-results.sarif'
            severity: 'CRITICAL,HIGH'
                            
        - name: Upload Trivy scan results to GitHub Security tab
          uses: github/codeql-action/upload-sarif@v3
          with:
            sarif_file: 'trivy-results.sarif'            

  update-k8s-file:
    name: updating k8s files
    runs-on: ubuntu-latest
    needs: trivy_scan
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in k8s file
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{github.run_id}}|g" kubernetes/Frontend/deployment.yaml    
  
  
      - name: Commit the changes
        run: |
          git config --global user.email "lokeshbabu.nalluri1111@gmail.com"
          git config --global user.name "nlokeshbabu1"
          git add kubernetes/Frontend/deployment.yaml
          git commit -m "Update image tag in k8s file"
          git push --force


    
          

        
