  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: setup
    steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN}}
        
 
        - name: setup of docker buildx
          uses: docker/setup-buildx-action@v3

        - name: login to docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and Push action
          uses: docker/build-push-action@v6
          with:
            context: Backend
            file: Backend/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{github.run_id}}


  trivy_scan:
    runs-on: ubuntu-latest
    needs: docker
    steps:
        - name: Run Trivy vulnerability scanner
          uses: aquasecurity/trivy-action@7b7aa264d83dc58691451798b4d117d53d21edfe
          with:
            image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/backend:${{github.run_id}}'
            format: 'sarif'
            template: '@/contrib/sarif.tpl'
            output: 'trivy-results.sarif'
            severity: 'CRITICAL,HIGH'
                  
        - name: Upload Trivy scan results to GitHub Security tab
          uses: github/codeql-action/upload-sarif@v3
          with:
            sarif_file: 'trivy-results.sarif'


  update-k8s-file:
    name: updating k8s files
    runs-on: ubuntu-latest
    needs: trivy_scan
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update image tag in k8s file
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{github.run_id}}|g" kubernetes/Backend/backend-deployemt.yaml    
            
            
      - name: Commit the changes
        run: |
                    git config --global user.email "lokeshbabu.nalluri1111@gmail.com"
                    git config --global user.name "nlokeshbabu1"
                    git add kubernetes/Backend/backend-deployemt.yaml
                    git commit -m "Update image tag in k8s file"
                    git push --force