name: CI for backend

on:
  push:
    branches:
        - master
    paths:
      - Backend/**
      - .github/workflows/backend-ci.yml


jobs:
  setup:
    name: Setting up python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.TOKEN }}
      
      
      - name: Install of python
        uses: actions/setup-python@v3
        with:
          python-version: '3.12'

      
      
      - name: Install Dependency
        run: |
           python -m pip install --upgrade pip
           cd Backend
           pip install -r requirements.txt

      

  docker:
    name: Docker build and push
    runs-on: ubuntu-latest
    needs: setup
    steps:
        - name: checkout code
          uses: actions/checkout@v4
          with:
            token: ${{ secrets.GITHUB_TOKEN}}
        
 
        - name: setup of docker buildx
          uses: docker/setup-buildx-action@v3

        - name: login to docker
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}

        - name: Build and Push action
          uses: docker/build-push-action@v6
          with:
            context: Backend
            file: Backend/Dockerfile
            push: true
            tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{github.run_id}}


  update-k8s-file:
    name: updating k8s files
    runs-on: ubuntu-lates
    needs: docker
    steps:
      - name: checkout the code
        uses: actions/checkout@v4
        with:
            token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update image tag in k8s file
        run: |
          sed -i "s|image:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{github.run_id}}|g" kubernetes/Backend/backend-deployemt.yaml    
            
            
      - name: Commit the changes
        run: |
                    git config --global user.email "lokeshbabu.nalluri1111@gmail.com"
                    git config --global user.name "nlokeshbabu1"
                    git add kubernetes/Backend/backend-deployemt.yaml
                    git commit -m "Update image tag in k8s file"
                    git push --force

    
          

        
