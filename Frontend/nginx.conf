server {
    listen 80;
    server_name localhost;

    # Set root for serving static files from React build
    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html; # Serve React app
    }

    # Optional: Proxy API calls if you were using a single API Gateway
    # For this microservice setup, frontend calls specific service ports directly.
    # So, no /api proxy needed here if frontend directly uses localhost:port for each service.
    # However, if running in a real Docker network where frontend_app talks to
    # product_service:5002, then the frontend's axios calls would be "http://product_service:5002/..."
    # and no Nginx proxy is needed for that.
}
