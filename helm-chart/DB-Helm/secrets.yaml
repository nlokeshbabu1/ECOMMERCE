apiVersion: v1
kind: Secret
metadata:
  name: mongodb-root-password
type: Opaque
data:
  # The values below are base64 encoded
  # Example: echo -n 'your-secure-password' | base64
  password: <BASE64_ENCODED_ROOT_PASSWORD>

---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-app-password
type: Opaque
data:
  # The values below are base64 encoded
  password: <BASE64_ENCODED_APP_PASSWORD>