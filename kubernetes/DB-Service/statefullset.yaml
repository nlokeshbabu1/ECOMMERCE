apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb-service
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongo
        image: mongo:6.0    # Use a fixed version instead of latest for stability
        ports:
        - containerPort: 27017

        command: # Changed from args to command
          - mongod        
        
        # ✅ Command-line args for Replica Set
        args:
          - "--replSet"
          - "rs0"
          - "--bind_ip_all"
          - "--auth"    #MongoDB requires a shared keyFile for internal authentication between the nodes.
          - "--keyFile"
          - "/etc/secrets/mongo-keyfile/mongo-keyfile"

        # ✅ Resource Requests & Limits (recommended for production)
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        # ✅ Environment Variables for credentials
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo
              key: user-name
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo
              key: password

        # ✅ Volume for Persistent Data
        volumeMounts:
        - name: mongo-mount
          mountPath: /data/db  
        - name: mongo-keyfile
          mountPath: /etc/secrets/mongo-keyfile
          readOnly: true

        # ✅ Liveness Probe (Checks MongoDB health)
        livenessProbe:
          exec:
            command:
            - mongosh
            - --quiet
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # ✅ Readiness Probe (Ensures pod is ready to accept traffic)
        readinessProbe:
          exec:
            command:
            - mongosh
            - --quiet
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        
      volumes:
        - name: mongo-keyfile
          secret:
            secretName: mongo-keyfile-secret


  # ✅ Persistent Volume Claim for each pod
  volumeClaimTemplates:
  - metadata:
      name: mongo-mount
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi