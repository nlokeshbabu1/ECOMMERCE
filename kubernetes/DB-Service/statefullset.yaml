apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb-service
  replicas: 2
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        fsGroup: 999
        runAsUser: 999
        runAsGroup: 999
      initContainers:
      - name: init-keyfile
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          cp /keyfile-secret/mongo-keyfile /keyfile/mongo-keyfile
          chmod 0400 /keyfile/mongo-keyfile
          chown 999:999 /keyfile/mongo-keyfile
          ls -la /keyfile/mongo-keyfile
        volumeMounts:
        - name: mongo-keyfile-secret
          mountPath: /keyfile-secret
          readOnly: true
        - name: mongo-keyfile
          mountPath: /keyfile
      containers:
      - name: mongo
        image: mongo:8.0
        ports:
        - containerPort: 27017

        args:
          - "--replSet"
          - "rs0"
          - "--bind_ip_all"
          - "--auth"
          - "--keyFile"
          - "/keyfile/mongo-keyfile"

        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"

        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongo
              key: user-name
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongo
              key: password

        volumeMounts:
        - name: mongo-mount
          mountPath: /data/db
        - name: mongo-keyfile
          mountPath: /keyfile
          readOnly: true
        - name: tmp-volume
          mountPath: /tmp

        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              mongosh --quiet --host 127.0.0.1 --port 27017 \
                -u "$MONGO_INITDB_ROOT_USERNAME" \
                -p "$MONGO_INITDB_ROOT_PASSWORD" \
                --authenticationDatabase admin \
                --eval 'db.adminCommand("ping")'
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3

      volumes:
        - name: mongo-keyfile-secret
          secret:
            secretName: mongo-keyfile-secret
            defaultMode: 0400
        - name: mongo-keyfile
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
        - name: tmp-volume
          emptyDir: {}

  volumeClaimTemplates:
  - metadata:
      name: mongo-mount
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "gp2"
      resources:
        requests:
          storage: 2Gi
