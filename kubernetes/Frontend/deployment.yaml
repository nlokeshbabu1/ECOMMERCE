apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1  # Adjust as needed for scaling
  selector:
    matchLabels:
      app: frontend-app
  template:
    metadata:
      labels:
        app: frontend-app
    spec:
      containers:
      - name: frontend-app
        image: nlokeshbabu/frontend:16387021921
        ports:
        - containerPort: 80
        env:
          - name: REACT_APP_BACKEND_URL
            value: "http://backend-service:5000"
        
        # Health Probes
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15  # Give time for Nginx to start
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30  # Ensure app is stable before liveness kicks in
          periodSeconds: 20

        # Resource Management
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "300m"